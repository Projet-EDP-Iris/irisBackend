name: Auto Tag on Push to Main

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate tag name
        id: tag
        run: |
          # Get current date and time for unique tag
          TAG="snapshot-$(date +'%Y%m%d-%H%M%S')"
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"
      
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.tag.outputs.tag_name }} -m "Automatic snapshot from commit ${{ github.sha }}"
          git push origin ${{ steps.tag.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
