version: '3.8'

services:
  db:
    image: postgres:16
    container_name: iris_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=iris_user  # On force le nom que l'API réclame
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris_user -d iris_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: iris_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/iris_user
      - SECRET_KEY=test-secret
    depends_on:
      - db