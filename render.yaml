# Render Blueprint for Iris Backend
# This file defines all infrastructure needed for the Iris API

services:
  # FastAPI Web Service
  # Database: Neon (https://neon.tech) — set DATABASE_URL manually in Render dashboard
  # Local development: Docker Compose (docker-compose.yml) manages PostgreSQL automatically
  - type: web
    name: iris-backend
    env: python
    region: oregon  # Should match database region for best performance
    plan: free  # Change to 'free' for free tier (note: free services sleep after 15 min of inactivity)

    # Build Configuration
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m spacy download en_core_web_lg
      python -m spacy download fr_core_news_sm
      python -c "import nltk; nltk.download('punkt_tab'); nltk.download('stopwords')"

    # Start Command
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Health Check
    healthCheckPath: /health

    # Auto-Deploy
    branch: main  # Deploy from main branch
    autoDeploy: true  # Auto-deploy on git push

    # Environment Variables
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard — use Neon connection string

      - key: SECRET_KEY
        generateValue: true  # Auto-generate a secure secret key

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

      - key: ALGORITHM
        value: HS256

      - key: PROJECT_NAME
        value: Iris API

      - key: PYTHON_VERSION
        value: 3.12.0

      # Environment setting (helps with logging and behavior)
      - key: ENVIRONMENT
        value: production

      # Encryption key for Apple Calendar passwords stored in DB
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: SECRET_ENCRYPTION_KEY
        sync: false

      # OpenAI — required for AI suggestion features
      - key: OPENAI_API_KEY
        sync: false

      # Google / Gmail OAuth — required for Gmail integration
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false  # Set to: https://<your-render-service>.onrender.com/api/v1/auth/google/callback
      - key: FRONTEND_URL
        sync: false  # Set to your frontend origin, e.g. https://<your-frontend>.vercel.app

      # Microsoft / Outlook OAuth — required for Outlook calendar/tasks integration
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false  # Set to: https://<your-render-service>.onrender.com/api/v1/auth/microsoft/callback

# Optional: Background Workers (for future async tasks like email processing)
# Gmail tokens are currently stored in the local `tokens/` directory, so free/ephemeral
# instances can lose Gmail connections after restarts unless token storage is made persistent.
